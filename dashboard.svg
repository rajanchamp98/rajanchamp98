<svg width="850" height="300" viewBox="0 0 850 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .card { fill: #1c1f26; stroke: #2c5364; stroke-width: 1.5; rx: 15; }
    .title { fill: #ffffff; font-size: 18px; font-family: Arial, sans-serif; }
    .text { fill: #a0aec0; font-size: 14px; font-family: Arial, sans-serif; }
  </style>

  <!-- Background -->
  <rect width="850" height="300" fill="#0f2027" rx="20"/>

  <!-- Left Card -->
  <rect x="30" y="40" width="360" height="180" class="card"/>
  <text x="50" y="70" class="title">GitHub Stats</text>
  <text x="50" y="100" class="text">⭐ Stars: Dynamic</text>
  <text x="50" y="120" class="text">📦 Repos: Dynamic</text>
  <text x="50" y="140" class="text">🔥 Contributions: Dynamic</text>

  <!-- Right Card -->
  <rect x="420" y="40" width="360" height="180" class="card"/>
  <text x="440" y="70" class="title">Top Languages</text>
  <text x="440" y="100" class="text">JavaScript</text>
  <text x="440" y="120" class="text">React</text>
  <text x="440" y="140" class="text">Node.js</text>

  <!-- Footer Wave -->
  <rect x="0" y="250" width="850" height="50" fill="#2c5364"/>
</svg>
